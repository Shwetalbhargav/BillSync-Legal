<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Task | BillSync Legal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F5EF; /* Level 0 Background per Style Guidance */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#27313c",
                    "on-secondary-container": "#735a00",
                    "on-primary-fixed": "#001c37",
                    "on-error": "#ffffff",
                    "surface-tint": "#3d608a",
                    "surface-variant": "#d9e3f1",
                    "secondary": "#755b00",
                    "inverse-primary": "#a6c9f9",
                    "surface-container": "#e4effd",
                    "on-primary-fixed-variant": "#234871",
                    "on-tertiary-fixed-variant": "#364764",
                    "surface-dim": "#d1dbe8",
                    "surface-container-highest": "#d9e3f1",
                    "tertiary-fixed-dim": "#b5c7ea",
                    "on-secondary-fixed-variant": "#584400",
                    "primary-fixed": "#d2e4ff",
                    "on-surface": "#121d26",
                    "on-tertiary": "#ffffff",
                    "secondary-container": "#fed255",
                    "on-surface-variant": "#43474e",
                    "outline-variant": "#c3c6cf",
                    "on-background": "#121d26",
                    "on-secondary-fixed": "#241a00",
                    "on-primary-container": "#83a6d4",
                    "on-tertiary-fixed": "#071c36",
                    "on-tertiary-container": "#92a4c5",
                    "inverse-on-surface": "#e8f2ff",
                    "error-container": "#ffdad6",
                    "surface": "#f7f9ff",
                    "secondary-fixed": "#ffe08e",
                    "tertiary-container": "#283a56",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "primary-container": "#123b63",
                    "surface-bright": "#f7f9ff",
                    "tertiary-fixed": "#d6e3ff",
                    "secondary-fixed-dim": "#ecc246",
                    "tertiary": "#11243f",
                    "surface-container-low": "#edf4ff",
                    "surface-container-high": "#dfe9f7",
                    "outline": "#73777f",
                    "primary-fixed-dim": "#a6c9f9",
                    "primary": "#002546",
                    "background": "#f7f9ff",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "md": "16px",
                    "xl": "32px",
                    "sm": "12px",
                    "xs": "4px",
                    "sidebar-width": "260px",
                    "base": "8px",
                    "lg": "24px",
                    "margin-desktop": "40px",
                    "gutter-desktop": "24px",
                    "xxl": "48px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-surface flex items-center justify-center min-h-screen p-md">
<!-- Focused Screen/Modal Container -->
<main class="w-full max-w-4xl bg-surface-container-lowest rounded-xl shadow-2xl overflow-hidden border border-outline-variant flex flex-col h-[921px]">
<!-- Header -->
<header class="flex justify-between items-center px-xl py-lg border-b border-surface-variant bg-surface-container-lowest shrink-0">
<div class="flex flex-col">
<h1 class="font-headline-md text-headline-md text-primary">Create New Task</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">Assigned to: <span class="text-secondary">Jonathan Doe (You)</span></p>
</div>
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Form Content (Scrollable) -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-xl">
<form class="grid grid-cols-12 gap-lg" id="taskForm">
<!-- Task Title -->
<div class="col-span-12">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="task_title">Task Title</label>
<input class="w-full p-md border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md bg-white transition-all outline-none" id="task_title" placeholder="e.g., Review Deposition Transcripts for Matter #2401" type="text"/>
</div>
<!-- Matter Association -->
<div class="col-span-12 md:col-span-6">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="matter_id">Matter Association</label>
<div class="relative">
<select class="w-full p-md pr-xl border border-outline-variant rounded-lg appearance-none focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md bg-white transition-all outline-none" id="matter_id">
<option value="">Select a Matter...</option>
<option value="1">Commonwealth v. Sterling [2024-081]</option>
<option value="2">Apex Tech M&amp;A Integration [2023-442]</option>
<option value="3">Estate of Martha Wayne Probate [2024-002]</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Due Date -->
<div class="col-span-12 md:col-span-6">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="due_date">Due Date</label>
<div class="relative">
<input class="w-full p-md border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md bg-white transition-all outline-none" id="due_date" type="date"/>
</div>
</div>
<!-- Priority -->
<div class="col-span-12">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Priority</label>
<div class="flex flex-wrap gap-md">
<label class="flex items-center cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<div class="px-lg py-sm border border-outline-variant rounded-full font-label-md text-label-md peer-checked:bg-surface-container peer-checked:border-primary peer-checked:text-primary transition-all group-hover:bg-surface-container-low">Low</div>
</label>
<label class="flex items-center cursor-pointer group">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<div class="px-lg py-sm border border-outline-variant rounded-full font-label-md text-label-md peer-checked:bg-surface-container peer-checked:border-primary peer-checked:text-primary transition-all group-hover:bg-surface-container-low">Medium</div>
</label>
<label class="flex items-center cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<div class="px-lg py-sm border border-outline-variant rounded-full font-label-md text-label-md peer-checked:bg-surface-container peer-checked:border-primary peer-checked:text-primary transition-all group-hover:bg-surface-container-low">High</div>
</label>
<label class="flex items-center cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="urgent"/>
<div class="px-lg py-sm border border-error-container text-error rounded-full font-label-md text-label-md peer-checked:bg-error-container peer-checked:border-error peer-checked:text-error transition-all group-hover:bg-error-container/50">Urgent</div>
</label>
</div>
</div>
<!-- Description -->
<div class="col-span-12">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="description">Description</label>
<textarea class="w-full p-md border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary font-body-md text-body-md bg-white transition-all outline-none resize-none" id="description" placeholder="Detailed instructions, notes, or internal context..." rows="4"></textarea>
</div>
<!-- Sub-tasks Section -->
<div class="col-span-12 mt-md">
<div class="flex justify-between items-center mb-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-xs">
<span class="material-symbols-outlined text-primary">checklist</span> Sub-tasks
                        </h2>
<button class="text-primary font-label-md text-label-md hover:underline flex items-center gap-xs transition-opacity active:opacity-60" type="button">
<span class="material-symbols-outlined text-base">add</span> Add Sub-task
                        </button>
</div>
<div class="space-y-sm bg-surface-container-low p-md rounded-xl border border-surface-variant">
<!-- Subtask Item 1 -->
<div class="flex items-center gap-md bg-white p-sm rounded-lg border border-outline-variant group shadow-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<input class="flex-1 font-body-sm text-body-sm bg-transparent border-none focus:ring-0 p-0" type="text" value="Draft initial response"/>
<button class="opacity-0 group-hover:opacity-100 text-on-surface-variant hover:text-error transition-all" type="button">
<span class="material-symbols-outlined text-base">delete</span>
</button>
</div>
<!-- Subtask Item 2 -->
<div class="flex items-center gap-md bg-white p-sm rounded-lg border border-outline-variant group shadow-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<input class="flex-1 font-body-sm text-body-sm bg-transparent border-none focus:ring-0 p-0" type="text" value="Verify court dates"/>
<button class="opacity-0 group-hover:opacity-100 text-on-surface-variant hover:text-error transition-all" type="button">
<span class="material-symbols-outlined text-base">delete</span>
</button>
</div>
</div>
</div>
<!-- Attachments Section -->
<div class="col-span-12 mt-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-xs mb-md">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">attachment</span> Attachments
                    </h2>
<div class="border-2 border-dashed border-outline-variant rounded-xl p-xl flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-headline-lg text-outline mb-sm group-hover:text-primary transition-colors">cloud_upload</span>
<p class="font-label-md text-label-md text-on-surface-variant">Drag and drop files here or <span class="text-primary underline">browse</span></p>
<p class="font-label-sm text-label-sm text-outline mt-xs">PDF, DOCX, or JPG (Max 25MB)</p>
</div>
</div>
</form>
</div>
<!-- Footer Actions -->
<footer class="flex justify-between items-center px-xl py-lg border-t border-surface-variant bg-surface-container-low shrink-0">
<button class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" type="button">
                Save as Draft
            </button>
<div class="flex gap-md">
<button class="px-xl py-md border border-outline text-primary font-label-md text-label-md rounded-lg hover:bg-surface-container-high transition-all active:scale-95 duration-150" type="button">
                    Cancel
                </button>
<button class="px-xl py-md bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-tertiary transition-all active:scale-95 duration-150 shadow-md" form="taskForm" type="submit">
                    Create Task
                </button>
</div>
</footer>
</main>
<!-- Visual Polish: Background Graphic -->
<div class="fixed inset-0 -z-10 overflow-hidden opacity-40 pointer-events-none">

</div>
<script>
        // Simple Interaction logic
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.submitter;
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-xs">progress_activity</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined mr-xs">check_circle</span> Task Created';
                btn.classList.replace('bg-primary', 'bg-secondary');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                }, 2000);
            }, 1200);
        });

        // Toggle focus state for better UX
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.col-span-12, .col-span-6')?.classList.add('opacity-100');
            });
        });
    </script>
</body></html>
