<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Session Expired | BillSync Legal</title>

            box-shadow: 0 4px 15px rgba(31, 41, 51, 0.06);
        }
    </style>

                      "primary-fixed": "#d2e4ff",
                      "tertiary-fixed-dim": "#b5c7ea",
                      "secondary-fixed-dim": "#ecc246",
                      "primary": "#002546",
                      "on-tertiary-container": "#92a4c5",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "outline": "#73777f",
                      "on-secondary-container": "#735a00",
                      "inverse-on-surface": "#e8f2ff",
                      "on-secondary-fixed": "#241a00",
                      "surface-variant": "#d9e3f1",
                      "surface-dim": "#d1dbe8",
                      "tertiary": "#11243f",
                      "secondary": "#755b00",
                      "secondary-fixed": "#ffe08e",
                      "surface-container-low": "#edf4ff",
                      "surface": "#f7f9ff",
                      "inverse-surface": "#27313c",
                      "error-container": "#ffdad6",
                      "tertiary-container": "#283a56",
                      "outline-variant": "#c3c6cf",
                      "on-tertiary": "#ffffff",
                      "on-primary": "#ffffff",

                      "on-error-container": "#93000a",
                      "surface-container-high": "#dfe9f7",

              "spacing": {
                      "sidebar-width": "260px",
                      "md": "16px",
                      "xxl": "48px",
                      "xs": "4px",
                      "gutter-desktop": "24px",
                      "xl": "32px",
                      "base": "8px",
                      "margin-desktop": "40px",

                      "lg": "24px"

              "fontFamily": {
                      "body-sm": ["Inter"],

          },

<body class="min-h-screen flex items-center justify-center p-md">
<!-- Main Content Canvas -->
<main class="w-full max-w-lg">
<!-- Session Expired Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl premium-shadow flex flex-col items-center text-center">
<!-- Icon/Visual Anchor -->
<div class="mb-lg w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="history">history</span>
</div>
<!-- Content -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">
                Your session has expired.
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mb-xl">
                For your security, you have been signed out after a period of inactivity. Any unsaved progress may have been lost to ensure the confidentiality of your client data.
            </p>
<!-- Action Area -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md px-lg rounded-lg hover:bg-primary-container transition-all duration-200 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                    Sign In Again
                </button>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors py-sm" href="#">
                    Return to Homepage
                </a>
</div>
</div>
<!-- Brand Footer Anchor (Contextual for Login/Session screens) -->
<div class="mt-xl flex flex-col items-center gap-xs">
<div class="flex items-center gap-xs text-primary opacity-60">
<span class="material-symbols-outlined text-[20px]" data-icon="balance">balance</span>
<span class="font-headline-sm text-headline-sm tracking-tight">BillSync Legal</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant">
                © 2024 BillSync Legal. Secure Law Firm Management.
            </p>
</div>
</main>
<!-- Subtle Background Detail -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-surface-container-high rounded-full blur-[120px] opacity-40"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-secondary-container rounded-full blur-[100px] opacity-20"></div>
</div>
<script>
        // Micro-interaction for button hover
        document.querySelector('button').addEventListener('mouseenter', function() {
            this.style.boxShadow = '0 8px 20px rgba(0, 37, 70, 0.15)';
        });
        document.querySelector('button').addEventListener('mouseleave', function() {
            this.style.boxShadow = 'none';
        });

        // Simulating a soft entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('main');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
