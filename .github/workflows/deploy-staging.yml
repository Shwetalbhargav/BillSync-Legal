name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-api-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api-Lexora
          push: true
          tags: ghcr.io/${{ github.repository }}/lexora-api:${{ github.sha }}

  deploy:
    needs: build-api-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger managed staging deployment
        run: |
          test -n "${{ secrets.STAGING_DEPLOY_WEBHOOK }}"
          curl -fsSL -X POST "${{ secrets.STAGING_DEPLOY_WEBHOOK }}"
